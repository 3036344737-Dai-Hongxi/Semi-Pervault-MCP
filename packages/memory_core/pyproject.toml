[project]
name = "memory-core"
version = "0.1.0"
description = "Pervault 本地优先个人记忆内核：四层记忆 + 知识图谱 + 混合检索 + 后台整理 agent（无 Web 框架依赖）"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "aiosqlite>=0.22.1",
    "openai>=2.30.0",
    "pydantic>=2.0.0",
    "sqlite-vec>=0.1.7",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memory_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
